# Docker Compose 配置
# 使用方法：
#   启动：docker compose up -d
#   停止：docker compose down
#   查看日志：docker compose logs -f
#   重新构建：docker compose up -d --build

version: '3.8'

services:

  # ========== AI 问答系统主服务 ==========
  ai-qa:
    build:
      context: .           # 使用当前目录的 Dockerfile 构建
      dockerfile: Dockerfile
    container_name: ai-qa-app
    restart: unless-stopped  # 崩溃自动重启，手动 stop 不重启

    ports:
      - "8501:8501"         # 宿主机端口:容器端口

    env_file:
      - .env                # 自动加载 .env 文件中的环境变量

    environment:
      - HF_ENDPOINT=https://hf-mirror.com   # HuggingFace 镜像加速

    volumes:
      # 挂载数据目录到宿主机，容器删除后数据不丢失
      - ./chat_history:/app/chat_history       # 聊天记录
      - ./knowledge_base:/app/knowledge_base   # 知识库文档
      - ./vector_db:/app/vector_db             # 向量数据库
      - ./hf_cache:/root/.cache/huggingface    # Embedding 模型缓存

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 资源限制（根据服务器配置调整）
    deploy:
      resources:
        limits:
          memory: 4G       # 最多使用 4GB 内存
        reservations:
          memory: 1G       # 至少保留 1GB 内存

  # ========== Ollama 本地模型服务（可选）==========
  # 如果使用本地模型，取消下面的注释
  # ollama:
  #   image: ollama/ollama
  #   container_name: ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ./ollama_models:/root/.ollama
  #   # GPU 支持（有 NVIDIA GPU 时取消注释）
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

networks:
  default:
    name: ai-qa-network
